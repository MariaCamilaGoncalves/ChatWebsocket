<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #0e0e12;
            --surface: #16161d;
            --surface2: #1e1e28;
            --border: rgba(255, 255, 255, 0.07);
            --accent: #7c6aff;
            --accent2: #ff6ab0;
            --text: #f0eeff;
            --text-muted: #7a7a9a;
            --sent-bg: linear-gradient(135deg, #7c6aff, #a78bfa);
            --received-bg: #1e1e28;
            --online: #4ade80;
            --radius: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before,
        body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        body::before {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            left: -100px;
        }

        body::after {
            width: 350px;
            height: 350px;
            background: var(--accent2);
            bottom: -80px;
            right: -80px;
        }

        #login-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            animation: fadeIn 0.4s ease;
        }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 340px;
            text-align: center;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
        }

        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(124, 106, 255, 0.4);
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .login-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }

        .login-card input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 14px;
        }

        .login-card input:focus {
            border-color: var(--accent);
        }

        .login-card button {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none;
            border-radius: 12px;
            padding: 13px;
            color: white;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .login-card button:hover {
            opacity: 0.9;
        }

        .login-card button:active {
            transform: scale(0.98);
        }

        .chat-wrapper {
            position: relative;
            z-index: 1;
            width: 420px;
            height: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .chat-header {
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border);
            background: rgba(14, 14, 18, 0.6);
            backdrop-filter: blur(12px);
        }

        .avatar {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .header-info h2 {
            font-size: 15px;
            font-weight: 600;
        }

        .header-info span {
            font-size: 12px;
            color: var(--online);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-info span::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--online);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            transition: color 0.2s, background 0.2s;
        }

        .icon-btn:hover {
            color: var(--text);
            background: rgba(124, 106, 255, 0.15);
        }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            scroll-behavior: smooth;
        }

        #messages::-webkit-scrollbar {
            width: 4px;
        }

        #messages::-webkit-scrollbar-track {
            background: transparent;
        }

        #messages::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .msg-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            animation: msgIn 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes msgIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.97);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .msg-group.sent {
            align-items: flex-end;
        }

        .msg-group.received {
            align-items: flex-start;
        }

        .msg-sender {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
            padding: 0 4px;
            margin-bottom: 2px;
        }

        .msg-group.sent .msg-sender {
            color: var(--accent);
        }

        .bubble {
            max-width: 78%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
            position: relative;
        }

        .msg-group.sent .bubble {
            background: var(--sent-bg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg-group.received .bubble {
            background: var(--received-bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        .bubble .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 3px;
            display: block;
            text-align: right;
            font-family: 'DM Mono', monospace;
        }

        .date-sep {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            margin: 10px 0;
            position: relative;
        }

        .date-sep::before,
        .date-sep::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background: var(--border);
        }

        .date-sep::before {
            left: 0;
        }

        .date-sep::after {
            right: 0;
        }

        .sys-msg {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 5px 14px;
            align-self: center;
            margin: 4px 0;
            animation: msgIn 0.3s ease;
        }

        .chat-input {
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(14, 14, 18, 0.6);
            backdrop-filter: blur(12px);
        }

        .input-wrap {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            padding: 4px 6px 4px 14px;
            transition: border-color 0.2s;
        }

        .input-wrap:focus-within {
            border-color: rgba(124, 106, 255, 0.5);
        }

        .input-wrap input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            padding: 8px 0;
        }

        .input-wrap input::placeholder {
            color: var(--text-muted);
        }

        .emoji-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 18px;
            cursor: pointer;
            padding: 4px 6px;
            transition: transform 0.2s;
        }

        .emoji-btn:hover {
            transform: scale(1.2);
        }

        .send-btn {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent), #a78bfa);
            border: none;
            border-radius: 13px;
            color: white;
            font-size: 17px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.2s;
            box-shadow: 0 4px 16px rgba(124, 106, 255, 0.4);
            flex-shrink: 0;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        #conn-status {
            text-align: center;
            font-size: 11px;
            padding: 6px;
            background: rgba(255, 100, 100, 0.1);
            color: #ff8080;
            display: none;
        }

        #conn-status.connected {
            background: rgba(74, 222, 128, 0.1);
            color: var(--online);
        }
    </style>
</head>

<body>

    <div id="login-screen">
        <div class="login-card">
            <div class="login-icon">💬</div>
            <h1>Bem-vindo ao Chat</h1>
            <p>Entre com seu nome para começar</p>
            <input id="name-input" type="text" placeholder="Seu nome..." maxlength="20" />
            <button onclick="enterChat()">Entrar no chat</button>
        </div>
    </div>

    <div class="chat-wrapper">
        <div id="conn-status">Conectando...</div>

        <div class="chat-header">
            <div class="avatar">💬</div>
            <div class="header-info">
                <h2>Chat Geral</h2>
                <span id="online-count">online</span>
            </div>
            <div class="header-actions">
                <div class="icon-btn" title="Participantes">👥</div>
            </div>
        </div>

        <div id="messages">
            <div class="date-sep">Hoje</div>
            <div class="sys-msg">🎉 Bem-vindo ao chat!</div>
        </div>

        <div class="chat-input">
            <div class="input-wrap">
                <input id="input" type="text" placeholder="Mensagem..." maxlength="500" />
                <button class="emoji-btn" onclick="toggleEmoji()">😊</button>
            </div>
            <button class="send-btn" onclick="sendMessage()">
                ➤
            </button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <script>
        let myName = '';
        let stompClient = null;
        let typingTimeout = null;
        const emojis = ['😊', '😂', '❤️', '👍', '🔥', '😎', '🥳', '😢', '🤔', '👏', '🙌', '✨'];

        function enterChat() {
            const val = document.getElementById('name-input').value.trim();
            if (!val) return;
            myName = val;
            document.getElementById('login-screen').style.animation = 'fadeIn 0.3s ease reverse';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                connect();
            }, 280);
        }

        document.getElementById('name-input').addEventListener('keydown', e => {
            if (e.key === 'Enter') enterChat();
        });

        function connect() {
            const status = document.getElementById('conn-status');
            status.style.display = 'block';
            status.textContent = 'Conectando...';
            status.className = '';

            const socket = new SockJS('http://localhost:8080/chat');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, () => {
                status.textContent = 'Conectado ✓';
                status.className = 'connected';
                setTimeout(() => status.style.display = 'none', 2000);

                stompClient.subscribe('/topic/messages', (msg) => {
                    const data = JSON.parse(msg.body);
                    if (data.type === 'system') {
                        addSystemMsg(data.content);
                    } else {
                        addMessage(data.sender, data.content, data.sender === myName);
                    }
                });

                stompClient.send('/app/send', {}, JSON.stringify({
                    sender: myName,
                    content: `${myName} entrou no chat`,
                    type: 'system'
                }));

            }, () => {
                status.style.display = 'block';
                status.textContent = '⚠ Sem conexão com o servidor';
                status.className = '';
            });
        }

        function sendMessage() {
            const input = document.getElementById('input');
            const text = input.value.trim();
            if (!text || !stompClient) return;

            stompClient.send('/app/send', {}, JSON.stringify({
                sender: myName,
                content: text,
                type: 'message'
            }));

            input.value = '';
            input.focus();
        }

        function addMessage(sender, content, isMine) {
            const messages = document.getElementById('messages');

            const lastGroup = messages.querySelector('.msg-group:last-child');
            const sameUser = lastGroup &&
                lastGroup.dataset.sender === sender &&
                lastGroup.classList.contains(isMine ? 'sent' : 'received');

            if (sameUser) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = `${content}<span class="time">${getTime()}</span>`;
                lastGroup.appendChild(bubble);
            } else {
                const group = document.createElement('div');
                group.className = `msg-group ${isMine ? 'sent' : 'received'}`;
                group.dataset.sender = sender;

                const senderEl = document.createElement('div');
                senderEl.className = 'msg-sender';
                senderEl.textContent = isMine ? 'Você' : sender;

                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.innerHTML = `${content}<span class="time">${getTime()}</span>`;

                group.appendChild(senderEl);
                group.appendChild(bubble);
                messages.appendChild(group);
            }

            messages.scrollTop = messages.scrollHeight;
        }

        function addSystemMsg(text) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'sys-msg';
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function getTime() {
            return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }



        document.getElementById('input').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendMessage();
        });

        function toggleEmoji() {
            let picker = document.getElementById('emoji-picker');
            if (picker) { picker.remove(); return; }

            picker = document.createElement('div');
            picker.id = 'emoji-picker';
            picker.style.cssText = `
        position: absolute; bottom: 80px; right: 70px;
        background: #1e1e28; border: 1px solid rgba(255,255,255,0.07);
        border-radius: 14px; padding: 10px;
        display: flex; flex-wrap: wrap; gap: 6px;
        width: 200px; z-index: 10;
        box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        animation: msgIn 0.2s ease;
      `;
            emojis.forEach(e => {
                const btn = document.createElement('button');
                btn.style.cssText = 'background:none;border:none;font-size:22px;cursor:pointer;border-radius:8px;padding:4px;transition:transform 0.1s';
                btn.textContent = e;
                btn.onmouseenter = () => btn.style.transform = 'scale(1.3)';
                btn.onmouseleave = () => btn.style.transform = 'scale(1)';
                btn.onclick = () => {
                    document.getElementById('input').value += e;
                    document.getElementById('input').focus();
                    picker.remove();
                };
                picker.appendChild(btn);
            });

            document.querySelector('.chat-wrapper').appendChild(picker);
            document.addEventListener('click', function outside(ev) {
                if (!picker.contains(ev.target) && ev.target.className !== 'emoji-btn') {
                    picker.remove();
                    document.removeEventListener('click', outside);
                }
            });
        }
    </script>
</body>

</html>
